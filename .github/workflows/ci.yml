name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests (CSV only, no API calls)
        run: python -m pytest tests/test_parsers.py -k "CSV" -v

      - name: Run persistence tests (no API calls)
        run: python -m pytest tests/test_db.py -v
